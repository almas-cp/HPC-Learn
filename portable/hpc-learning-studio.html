{
  "id": "hpc-fundamentals",
  "title": "HPC Fundamentals",
  "description": "Core ideas, workloads, performance vocabulary, and the difference between capacity and capability computing.",
  "order": 1,
  "estimatedMinutes": 58,
  "color": "#52ad46",
  "outcomes": ["Define HPC and its value", "Read basic performance metrics", "Distinguish throughput, latency, scale-up, and scale-out"],
  "lessons": [
    {
      "id": "hpc-what-is-hpc",
      "title": "What Makes a System High Performance",
      "overview": "HPC combines many processors, fast memory, accelerators, storage, networking, and software into one coordinated environment for solving large computational problems.",
      "lessonType": "text",
      "order": 1,
      "estimatedMinutes": 18,
      "learningObjectives": ["Define HPC in practical terms", "Identify typical HPC workloads", "Explain why coordination matters more than raw hardware alone"],
      "content": [
        { "type": "paragraph", "body": "High Performance Computing is the practice of using tightly coordinated computing resources to solve problems that are too large, too slow, or too data intensive for a single ordinary machine. Weather models, molecular dynamics, computational fluid dynamics, seismic imaging, genomics, and large AI training runs are common examples." },
        { "type": "paragraph", "body": "An HPC system is not just a fast server. It is a complete environment: compute nodes, accelerators, high-bandwidth memory, low-latency interconnects, parallel file systems, schedulers, compilers, communication libraries, monitoring, and operational policies. The system is designed so many independent components can act like one scientific instrument." },
        { "type": "diagram", "title": "HPC Stack", "nodes": ["Applications", "Programming Models", "Middleware", "System Software", "Compute, Network, Storage"] },
        { "type": "example", "body": "A single laptop may run a simulation at 1,000 particles per second. A cluster can divide the domain across 512 GPU-enabled nodes and exchange boundary data over a fast network, making a high-resolution simulation feasible in hours instead of months." }
      ],
      "summary": "HPC is a coordinated stack for large-scale computation. Hardware is important, but software, networking, storage, and operational discipline determine whether the system is actually useful.",
      "quiz": [
        { "id": "q-hpc-1", "question": "Which statement best describes HPC?", "choices": ["A coordinated computing environment for large-scale problems", "A single desktop with a high clock speed", "A cloud file storage service", "A database backup tool"], "answer": 0, "explanation": "HPC depends on coordinated compute, network, storage, and software resources." },
        { "id": "q-hpc-2", "question": "Why is networking important in many HPC workloads?", "choices": ["It lets distributed tasks exchange data quickly", "It replaces the need for compilers", "It stores user home directories", "It guarantees better source code"], "answer": 0, "explanation": "Parallel tasks often need low-latency communication to remain efficient." }
      ],
      "flashcards": [
        { "id": "fc-hpc-1", "front": "What is HPC?", "back": "Coordinated use of many compute, storage, networking, and software resources to solve large computational problems." },
        { "id": "fc-hpc-2", "front": "Name three common HPC workload domains.", "back": "Weather modeling, molecular dynamics, CFD, seismic imaging, genomics, or large AI training." }
      ]
    },
    {
      "id": "hpc-performance-vocabulary",
      "title": "Performance Vocabulary",
      "overview": "Performance discussions use precise terms such as FLOPS, latency, bandwidth, utilization, speedup, efficiency, and scalability.",
      "lessonType": "interactive-diagram",
      "order": 2,
      "estimatedMinutes": 20,
      "learningObjectives": ["Interpret FLOPS, latency, and bandwidth", "Calculate speedup and parallel efficiency", "Recognize bottleneck language"],
      "content": [
        { "type": "paragraph", "body": "FLOPS measures floating-point operations per second, but peak FLOPS is only a ceiling. Real applications may be limited by memory bandwidth, cache misses, communication latency, file system throughput, synchronization, or serial sections of code." },
        { "type": "paragraph", "body": "Speedup compares runtime on one resource count to runtime on a larger resource count. Parallel efficiency divides speedup by the number of resources. If a job runs 8 times faster on 16 nodes, efficiency is 50 percent." },
        { "type": "code", "language": "text", "body": "speedup = baseline_runtime / parallel_runtime\\nefficiency = speedup / number_of_nodes" },
        { "type": "diagram", "title": "Common Bottlenecks", "nodes": ["Compute bound", "Memory bound", "Network bound", "I/O bound", "Synchronization bound"] }
      ],
      "summary": "Useful performance analysis looks beyond peak FLOPS and asks which subsystem limits the workload.",
      "quiz": [
        { "id": "q-perf-1", "question": "A job runs in 100 minutes on 1 node and 20 minutes on 8 nodes. What is the speedup?", "choices": ["5x", "8x", "20x", "80x"], "answer": 0, "explanation": "100 divided by 20 equals a 5x speedup." },
        { "id": "q-perf-2", "question": "What does memory bandwidth describe?", "choices": ["How much data can move between memory and processors per second", "How many files a user owns", "How many jobs are queued", "How many compilers are installed"], "answer": 0, "explanation": "Bandwidth describes data movement rate." }
      ],
      "flashcards": [
        { "id": "fc-perf-1", "front": "What is parallel efficiency?", "back": "Speedup divided by the number of parallel resources used." },
        { "id": "fc-perf-2", "front": "Why can peak FLOPS mislead?", "back": "Applications may be limited by memory, network, I/O, synchronization, or serial work." }
      ]
    },
    {
      "id": "hpc-capacity-capability",
      "title": "Capacity vs Capability Computing",
      "overview": "HPC centers balance many medium-sized production jobs with a smaller number of extreme jobs that require a large fraction of the machine.",
      "lessonType": "text",
      "order": 3,
      "estimatedMinutes": 20,
      "learningObjectives": ["Compare capacity and capability computing", "Explain queue policy tradeoffs", "Connect workload shape to scheduling strategy"],
      "content": [
        { "type": "paragraph", "body": "Capacity computing maximizes the number of useful jobs completed over time. It often involves many independent or modestly parallel workloads such as parameter sweeps, ensemble simulations, and routine model runs." },
        { "type": "paragraph", "body": "Capability computing uses a large portion of the system for one demanding job. These jobs may push memory, interconnect, checkpoint, and scheduler limits. They are important when scientific resolution or time-to-answer requires a very large run." },
        { "type": "example", "body": "A climate group may run 1,000 ensemble members as capacity work, then reserve thousands of nodes for a single high-resolution storm simulation as capability work." },
        { "type": "diagram", "title": "Workload Mix", "nodes": ["Many small jobs", "Medium MPI jobs", "GPU training", "Large capability run"] }
      ],
      "summary": "Capacity emphasizes throughput across many jobs; capability emphasizes solving one problem at extreme scale.",
      "quiz": [
        { "id": "q-cap-1", "question": "Which job is the best example of capability computing?", "choices": ["One simulation using thousands of nodes", "A daily cron job compressing logs", "A small spreadsheet calculation", "A web request handler"], "answer": 0, "explanation": "Capability jobs use a large fraction of the system for a single hard problem." },
        { "id": "q-cap-2", "question": "What does capacity computing optimize?", "choices": ["Useful throughput across many jobs", "The number of login nodes", "Only peak theoretical FLOPS", "The color of dashboard charts"], "answer": 0, "explanation": "Capacity computing is about completing many useful workloads efficiently." }
      ],
      "flashcards": [
        { "id": "fc-cap-1", "front": "Capacity computing", "back": "Running many useful jobs efficiently to maximize throughput." },
        { "id": "fc-cap-2", "front": "Capability computing", "back": "Using a large share of a system for one problem that needs extreme scale." }
      ]
    }
  ]
}

{
  "id": "cluster-architecture",
  "title": "Cluster Architecture",
  "description": "How nodes, accelerators, memory, interconnects, storage, and management networks form a production cluster.",
  "order": 2,
  "estimatedMinutes": 64,
  "color": "#1f6feb",
  "dependencies": ["hpc-fundamentals"],
  "outcomes": ["Identify core cluster components", "Explain node roles", "Describe storage and network tradeoffs"],
  "lessons": [
    {
      "id": "cluster-node-anatomy",
      "title": "Anatomy of a Compute Node",
      "overview": "A compute node combines CPUs, GPUs or other accelerators, memory, local storage, network adapters, firmware, and operating system services.",
      "lessonType": "interactive-diagram",
      "order": 1,
      "estimatedMinutes": 22,
      "learningObjectives": ["Describe CPU, GPU, memory, and NIC roles", "Explain NUMA at a high level", "Recognize why locality matters"],
      "content": [
        { "type": "paragraph", "body": "A node is the unit a scheduler allocates. Modern nodes often contain multiple CPU sockets, several GPUs, high-bandwidth memory, local NVMe devices, and one or more high-speed network interface cards." },
        { "type": "paragraph", "body": "Locality matters because moving data can cost more than computing on it. NUMA means memory access time depends on which CPU socket owns the memory. GPU jobs also care about PCIe or fabric topology between CPUs, GPUs, and NICs." },
        { "type": "diagram", "title": "Node Data Paths", "nodes": ["CPU sockets", "System memory", "GPU accelerators", "NVMe scratch", "High-speed NIC"] },
        { "type": "example", "body": "A distributed AI training job may bind each process to one GPU, keep data loaders near the correct CPU socket, and use GPU-aware communication through the closest NIC." }
      ],
      "summary": "Node performance depends on compute units and on the paths between CPU, GPU, memory, storage, and network devices.",
      "quiz": [
        { "id": "q-node-1", "question": "What does NUMA primarily affect?", "choices": ["Memory access locality and latency", "Git branch names", "Scheduler account names", "File extension formats"], "answer": 0, "explanation": "NUMA describes non-uniform memory access across CPU sockets." },
        { "id": "q-node-2", "question": "Why does GPU to NIC topology matter?", "choices": ["It affects communication efficiency for distributed GPU jobs", "It changes the programming language syntax", "It removes the need for memory", "It determines user passwords"], "answer": 0, "explanation": "GPU-aware communication benefits from efficient paths between accelerators and network devices." }
      ],
      "flashcards": [
        { "id": "fc-node-1", "front": "What is a compute node?", "back": "The schedulable unit containing processors, memory, accelerators, storage, and network devices." },
        { "id": "fc-node-2", "front": "Why does locality matter?", "back": "Data movement across sockets, buses, or network links can dominate runtime." }
      ]
    },
    {
      "id": "cluster-networks-storage",
      "title": "Interconnects and Parallel Storage",
      "overview": "Low-latency networks and parallel file systems make multi-node applications and data-intensive workflows possible.",
      "lessonType": "text",
      "order": 2,
      "estimatedMinutes": 22,
      "learningObjectives": ["Distinguish management and high-speed networks", "Explain parallel file system purpose", "Identify metadata bottlenecks"],
      "content": [
        { "type": "paragraph", "body": "Most clusters have at least two networks: a management network for provisioning and control, and a high-speed fabric for application traffic. Fabrics such as InfiniBand or HPE Slingshot focus on low latency, high bandwidth, congestion control, and efficient collective operations." },
        { "type": "paragraph", "body": "Parallel file systems such as Lustre, GPFS, or BeeGFS stripe data across many storage targets. This supports high aggregate bandwidth, but workloads with millions of tiny files may become metadata-bound." },
        { "type": "diagram", "title": "Cluster Data Plane", "nodes": ["Compute nodes", "High-speed fabric", "Metadata servers", "Object storage targets", "Archive tier"] },
        { "type": "example", "body": "Checkpoint files from 2,000 ranks should be written in a coordinated pattern. Otherwise every rank may hit metadata servers at once and create a file system storm." }
      ],
      "summary": "HPC storage and networks are shared performance resources. Efficient applications minimize unnecessary small-file and communication pressure.",
      "quiz": [
        { "id": "q-net-1", "question": "What is the main role of a high-speed interconnect?", "choices": ["Fast communication between nodes", "User interface styling", "Source code formatting", "Password rotation only"], "answer": 0, "explanation": "The high-speed fabric carries performance-sensitive application traffic." },
        { "id": "q-net-2", "question": "What often hurts parallel file system metadata servers?", "choices": ["Millions of small file operations", "A single large sequential write", "Using job arrays", "Reading documentation"], "answer": 0, "explanation": "Small-file storms can overload metadata services." }
      ],
      "flashcards": [
        { "id": "fc-net-1", "front": "Why use a parallel file system?", "back": "To provide high aggregate bandwidth by distributing data and I/O work." },
        { "id": "fc-net-2", "front": "Management network vs fabric", "back": "Management controls nodes; the high-speed fabric carries performance-sensitive job traffic." }
      ]
    },
    {
      "id": "cluster-topologies",
      "title": "Topology and Failure Domains",
      "overview": "Physical layout, network topology, racks, power domains, and cooling zones influence performance and reliability.",
      "lessonType": "text",
      "order": 3,
      "estimatedMinutes": 20,
      "learningObjectives": ["Explain topology-aware placement", "Identify failure domains", "Connect topology to operations"],
      "content": [
        { "type": "paragraph", "body": "Large clusters are arranged into racks, cabinets, chassis, and network groups. Jobs placed close together may communicate faster than jobs spread across distant groups, depending on the network topology." },
        { "type": "paragraph", "body": "A failure domain is a set of components likely to fail together, such as a rack power feed or network switch. Operators use this knowledge for maintenance windows, replica placement, and risk assessment." },
        { "type": "diagram", "title": "Topology-Aware Scheduling", "nodes": ["Rack A", "Rack B", "Leaf switches", "Spine switches", "Job placement"] },
        { "type": "example", "body": "A tightly coupled MPI job may benefit from nodes within the same network island, while independent array jobs can be spread broadly to increase utilization." }
      ],
      "summary": "Topology affects both performance and reliability. Placement policies should match communication patterns and operational risk.",
      "quiz": [
        { "id": "q-topo-1", "question": "What is topology-aware scheduling?", "choices": ["Placing jobs with awareness of physical or network layout", "Sorting files alphabetically", "Disabling all GPUs", "Choosing random passwords"], "answer": 0, "explanation": "Topology-aware placement considers network and hardware layout." },
        { "id": "q-topo-2", "question": "What is a failure domain?", "choices": ["A group of components likely to fail together", "A compiler warning category", "A quiz scoring rule", "A shell variable"], "answer": 0, "explanation": "Failure domains help operators reason about correlated risk." }
      ],
      "flashcards": [
        { "id": "fc-topo-1", "front": "Topology-aware placement", "back": "Scheduling jobs while considering network or physical layout." },
        { "id": "fc-topo-2", "front": "Failure domain", "back": "A set of components with shared failure risk, such as a rack or switch group." }
      ]
    }
  ]
}

{
  "id": "system-software",
  "title": "System Software",
  "description": "Operating systems, drivers, compilers, math libraries, containers, and environment modules.",
  "order": 3,
  "estimatedMinutes": 61,
  "color": "#3f8f35",
  "dependencies": ["cluster-architecture"],
  "outcomes": ["Use environment modules", "Explain compiler and library roles", "Understand driver/runtime compatibility"],
  "lessons": [
    {
      "id": "software-os-drivers",
      "title": "Operating Systems and Drivers",
      "overview": "The OS, kernel, device drivers, and accelerator runtimes create the base layer on which every HPC application depends.",
      "lessonType": "text",
      "order": 1,
      "estimatedMinutes": 20,
      "learningObjectives": ["Explain why OS consistency matters", "Describe driver and runtime roles", "Recognize compatibility risk"],
      "content": [
        { "type": "paragraph", "body": "HPC sites typically standardize compute node images so jobs see predictable kernels, libraries, drivers, security settings, and mount points. Even small differences can break applications compiled against specific runtime versions." },
        { "type": "paragraph", "body": "GPU and accelerator software stacks include kernel drivers, user-space runtimes, math libraries, profilers, debuggers, and communication plugins. These pieces must match firmware and application expectations." },
        { "type": "diagram", "title": "Base Software Layer", "nodes": ["Kernel", "Device drivers", "Accelerator runtime", "System libraries", "Security policy"] },
        { "type": "example", "body": "A ROCm or CUDA application may compile successfully but fail at runtime if the node driver and user-space runtime are incompatible." }
      ],
      "summary": "Stable system software is a foundation. Drivers, kernels, and runtimes must align with applications and hardware.",
      "quiz": [
        { "id": "q-os-1", "question": "Why do clusters standardize node images?", "choices": ["To provide predictable runtime environments", "To make every user write the same code", "To remove schedulers", "To avoid networking"], "answer": 0, "explanation": "Consistency reduces runtime and compatibility failures." },
        { "id": "q-os-2", "question": "What can happen if GPU drivers and runtimes mismatch?", "choices": ["Runtime failures or missing device support", "Automatic performance perfection", "No need for libraries", "More storage metadata"], "answer": 0, "explanation": "Driver/runtime mismatches are a common source of accelerator failures." }
      ],
      "flashcards": [
        { "id": "fc-os-1", "front": "Why standardize compute images?", "back": "To keep kernels, drivers, libraries, and policies predictable across jobs." },
        { "id": "fc-os-2", "front": "Driver/runtime compatibility", "back": "Kernel drivers and user-space runtimes must match hardware and application expectations." }
      ]
    },
    {
      "id": "software-compilers-libraries",
      "title": "Compilers and Math Libraries",
      "overview": "Compiler choice, optimization flags, MPI implementations, BLAS, FFT, and solver libraries strongly influence application performance.",
      "lessonType": "code",
      "order": 2,
      "estimatedMinutes": 21,
      "learningObjectives": ["Explain compiler optimization", "Identify common math libraries", "Understand ABI and MPI compatibility"],
      "content": [
        { "type": "paragraph", "body": "Compilers translate source code into binaries optimized for a target CPU or accelerator. Flags can enable vector instructions, link-time optimization, OpenMP, GPU offload, or architecture-specific tuning." },
        { "type": "paragraph", "body": "Math libraries package highly tuned implementations of dense linear algebra, sparse solvers, FFTs, random numbers, and collectives. Using a vendor-tuned BLAS can be much faster than hand-written loops." },
        { "type": "code", "language": "bash", "body": "module load gcc openmpi openblas\\nmpicc -O3 -march=native solver.c -lopenblas -o solver\\nsrun -n 128 ./solver" },
        { "type": "diagram", "title": "Build Chain", "nodes": ["Source", "Compiler", "MPI", "Math libraries", "Executable"] }
      ],
      "summary": "Good builds use compatible compilers and libraries tuned for the machine and programming model.",
      "quiz": [
        { "id": "q-comp-1", "question": "What is one purpose of compiler optimization flags?", "choices": ["Generate faster code for a target architecture", "Create user accounts", "Allocate scheduler priority", "Back up databases"], "answer": 0, "explanation": "Optimization flags influence generated machine code." },
        { "id": "q-comp-2", "question": "Why use tuned math libraries?", "choices": ["They provide optimized kernels for common numerical operations", "They replace the operating system", "They prevent all bugs", "They store cluster logs"], "answer": 0, "explanation": "Libraries like BLAS and FFT implementations are heavily optimized." }
      ],
      "flashcards": [
        { "id": "fc-comp-1", "front": "What does MPI provide?", "back": "A message-passing interface for communication between distributed processes." },
        { "id": "fc-comp-2", "front": "Why load matching compiler and MPI modules?", "back": "ABI and runtime compatibility can break when build components are mixed incorrectly." }
      ]
    },
    {
      "id": "software-modules-containers",
      "title": "Modules and Containers",
      "overview": "Environment modules and HPC containers help users switch complex software stacks without modifying the base system.",
      "lessonType": "code",
      "order": 3,
      "estimatedMinutes": 20,
      "learningObjectives": ["Use module commands", "Explain container benefits", "Know when containers do not remove hardware dependencies"],
      "content": [
        { "type": "paragraph", "body": "Environment modules modify variables such as PATH, LD_LIBRARY_PATH, MANPATH, and compiler wrappers. They let users select software versions and keep incompatible stacks separate." },
        { "type": "paragraph", "body": "Containers package user-space dependencies for repeatability. HPC container runtimes such as Apptainer are designed for shared clusters and can expose GPUs, high-speed networks, and parallel file systems without giving users full root privileges." },
        { "type": "code", "language": "bash", "body": "module avail\\nmodule load python/3.11 openmpi/5\\napptainer exec --nv pytorch.sif python train.py" },
        { "type": "example", "body": "A container can carry a Python environment, but it still relies on compatible host GPU drivers and network libraries for full accelerator and MPI performance." }
      ],
      "summary": "Modules manage site software; containers improve reproducibility but still depend on host hardware integration.",
      "quiz": [
        { "id": "q-mod-1", "question": "What does an environment module usually change?", "choices": ["Shell environment variables", "Physical rack cabling", "CPU transistor count", "Quiz answers"], "answer": 0, "explanation": "Modules adjust variables so commands and libraries resolve to selected versions." },
        { "id": "q-mod-2", "question": "What do containers help with?", "choices": ["Reproducible user-space environments", "Replacing every device driver", "Cooling the data center", "Automatically tuning all algorithms"], "answer": 0, "explanation": "Containers package dependencies, but hardware integration still matters." }
      ],
      "flashcards": [
        { "id": "fc-mod-1", "front": "Environment modules", "back": "A tool for switching software stacks by changing shell environment variables." },
        { "id": "fc-mod-2", "front": "HPC container caveat", "back": "Containers package user space, but host drivers and hardware libraries still matter." }
      ]
    }
  ]
}

{
  "id": "middleware-resource-management",
  "title": "Middleware & Resource Management",
  "description": "Schedulers, queues, job arrays, workflow engines, provisioning, and data movement services.",
  "order": 4,
  "estimatedMinutes": 63,
  "color": "#e96922",
  "dependencies": ["system-software"],

      "id": "optimization-method",
      "title": "Measure Before You Tune",
      "overview": "Optimization starts with a reproducible baseline, representative inputs, clear metrics, and evidence from profilers or counters.",
      "lessonType": "text",
      "order": 1,
      "estimatedMinutes": 22,
      "learningObjectives": ["Build an optimization baseline", "Avoid premature tuning", "Select meaningful metrics"],
      "content": [
        { "type": "paragraph", "body": "The first optimization step is to define what matters: time to solution, throughput, cost, energy, memory footprint, queue wait, or accuracy. A change that improves kernel speed but increases total workflow time may not be a real win." },
        { "type": "paragraph", "body": "Use representative datasets, fixed software versions, repeatable launch scripts, and recorded hardware placement. Without a stable baseline, performance changes can be noise from the scheduler, file system, or input size." },
        { "type": "diagram", "title": "Optimization Loop", "nodes": ["Baseline", "Profile", "Hypothesize", "Change one thing", "Measure", "Document"] },
        { "type": "example", "body": "Before rewriting a solver, a team profiles it and discovers 60 percent of wall time is spent reading small files during startup. The highest-impact fix is data layout, not math kernels." }
      ],
      "summary": "Reliable tuning is a controlled experiment. Measure the whole workflow, change one thing, and keep evidence.",
      "quiz": [
        { "id": "q-opt-1", "question": "What should come before tuning?", "choices": ["A reproducible baseline and measurement", "Changing random flags", "Deleting logs", "Buying storage without evidence"], "answer": 0, "explanation": "Optimization needs a baseline and evidence." },
        { "id": "q-opt-2", "question": "Why use representative inputs?", "choices": ["Small toy inputs may hide real bottlenecks", "They make syntax irrelevant", "They avoid all need for profiling", "They guarantee perfect scaling"], "answer": 0, "explanation": "Performance behavior can change with realistic problem sizes." }
      ],
      "flashcards": [
        { "id": "fc-opt-1", "front": "Optimization baseline", "back": "A reproducible reference run used to compare tuning changes." },
        { "id": "fc-opt-2", "front": "Optimization loop", "back": "Baseline, profile, hypothesize, change one thing, measure, document." }
      ]
    },
    {
      "id": "optimization-scaling-roofline",
      "title": "Scaling and Roofline Thinking",
      "overview": "Strong scaling, weak scaling, and roofline analysis help explain whether performance is limited by compute, memory, or communication.",
      "lessonType": "interactive-diagram",
      "order": 2,
      "estimatedMinutes": 24,
      "learningObjectives": ["Compare strong and weak scaling", "Interpret roofline concepts", "Recognize diminishing returns"],
      "content": [
        { "type": "paragraph", "body": "Strong scaling keeps the problem size fixed while increasing resources. Weak scaling grows the problem size with resources. Strong scaling eventually hits limits because each worker gets less useful work while communication and synchronization remain." },
        { "type": "paragraph", "body": "Roofline analysis relates arithmetic intensity to attainable performance. Low arithmetic intensity workloads are often memory-bandwidth bound; high intensity workloads can approach compute ceilings if they vectorize and use hardware well." },
        { "type": "code", "language": "text", "body": "arithmetic_intensity = floating_point_operations / bytes_moved" },
        { "type": "diagram", "title": "Scaling Questions", "nodes": ["Fixed problem?", "Growing problem?", "Memory traffic?", "Network traffic?", "Compute ceiling?"] }
      ],
      "summary": "Scaling studies reveal parallel limits, while roofline thinking separates compute-bound and memory-bound behavior.",
      "quiz": [
        { "id": "q-scale-1", "question": "What is strong scaling?", "choices": ["Fixed problem size with increasing resources", "Increasing problem size with resources", "Changing only the file name", "Using no communication"], "answer": 0, "explanation": "Strong scaling measures speedup for a fixed workload." },
        { "id": "q-scale-2", "question": "What does arithmetic intensity compare?", "choices": ["Operations to bytes moved", "Users to passwords", "Jobs to flashcards", "Files to dashboards"], "answer": 0, "explanation": "Roofline uses operations per byte moved." }
      ],
      "flashcards": [
        { "id": "fc-scale-1", "front": "Strong scaling", "back": "Increasing resources for a fixed problem size." },
        { "id": "fc-scale-2", "front": "Weak scaling", "back": "Increasing resources while growing the problem size proportionally." }
      ]
    },
    {
      "id": "optimization-io-workflow",
      "title": "I/O and Workflow Tuning",
      "overview": "End-to-end performance includes file formats, checkpoint cadence, staging, metadata behavior, scheduler efficiency, and visualization pipelines.",
      "lessonType": "code",
      "order": 3,
      "estimatedMinutes": 22,
      "learningObjectives": ["Identify I/O bottlenecks", "Tune checkpoint and output patterns", "Optimize whole workflows instead of isolated kernels"],
      "content": [
        { "type": "paragraph", "body": "I/O tuning is often about reducing avoidable operations: fewer tiny files, better collective writes, appropriate stripe counts, local scratch for temporary data, and data formats designed for parallel access." },
        { "type": "paragraph", "body": "Workflow tuning looks at the path from input staging to final analysis. A simulation that runs faster but produces output that takes days to analyze may shift the bottleneck rather than remove it." },
        { "type": "code", "language": "bash", "body": "# Example checklist\\n# 1. batch small outputs into larger files\\n# 2. write checkpoints at measured intervals\\n# 3. stage hot input on node-local scratch\\n# 4. postprocess near the data" },
        { "type": "example", "body": "Switching from per-rank text logs to aggregated structured output can reduce metadata load and make downstream analysis faster." }
      ],
      "summary": "The best optimization target is the bottleneck in the full workflow, not necessarily the most visible kernel.",
      "quiz": [
        { "id": "q-io-1", "question": "What can reduce metadata pressure?", "choices": ["Aggregating many tiny outputs into fewer larger files", "Creating more tiny files", "Disabling all monitoring", "Ignoring checkpoint size"], "answer": 0, "explanation": "Fewer larger files can reduce metadata load." },
        { "id": "q-io-2", "question": "Why optimize the whole workflow?", "choices": ["A local speedup can move the bottleneck elsewhere", "Kernels never matter", "Storage is always free", "Schedulers cannot affect runtime"], "answer": 0, "explanation": "End-to-end time matters to users." }
      ],
      "flashcards": [
        { "id": "fc-io-1", "front": "Metadata bottleneck", "back": "A slowdown caused by too many file create, stat, open, or close operations." },
        { "id": "fc-io-2", "front": "Workflow tuning", "back": "Improving end-to-end time across staging, compute, output, analysis, and archive." }
      ]
    }
  ]
}
