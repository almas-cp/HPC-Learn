services:
  - type: web
    name: hpc-learning-studio
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/src/server/data/lms.sqlite
    disk:
      name: lms-sqlite-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
